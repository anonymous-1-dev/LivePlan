external_planner:
  # Model Configuration
  model:
    model_name: "minimax/minimax-m3"
    model_class: "openrouter"
    model_kwargs:
      temperature: 0.0
      max_tokens: 1000

    # Cache Control (optional): Enable prompt caching for efficiency
    # Options: "default_end" (cache last message) or null (no caching)
    set_cache_control: "default_end"

  # Trigger Configuration
  min_steps_between_refinements: 5
  update_plan: false

  # Prompt Assembly Configuration
  trajectory_scope: "recent"
  # Options:
  # - "full": use all trajectory steps so far
  # - "recent": use only recent trajectory steps since the last trigger
  # - "selected": use selected relevant trajectory steps (not implemented yet)

  state_summary_mode: "none"
  # Options:
  # - "full": include full <state_summary> information
  # - "rule": include only the currently triggered rule message(s)
  # - "none": do not include state summary information

  include_last_guidance: true
  # true: include <latest_guidance> ... </latest_guidance>
  # false: omit the last refinement guidance from the prompt

  system: |-
    You are an expert Principal Software Engineer acting as an external planning supervisor.
    Your job is to analyze an ongoing bug-fix attempt by an autonomous agent and propose
    the most useful NEXT SINGLE STEP for the same run.

    You NEVER execute commands, edit files, or run tests.
    You ONLY:
    - understand the issue description,
    - read the recent trajectory steps from the current run,
    - use the latest guidance from the previous refinement if it exists,
    - identify what likely went wrong or what is missing,
    - evaluate the recent strategy, and
    - output a refined high-level plan for the very next step.

    CONSTRAINTS:
    - Do NOT invent repository files, APIs, or behavior not supported by the inputs.
    - Do NOT output shell commands, code edits, file paths, or git operations.
    - Do NOT suggest modifying existing repository tests or project configuration files (e.g., pyproject.toml, setup.cfg, setup.py, tox.ini).
    - Base your answer primarily on the issue description and recent trajectory.
    - Do not assume access to any hidden earlier context.

    You will be provided with:
    - <issue_description> ... </issue_description>
    - <latest_guidance> ... </latest_guidance> (optional; may be empty)
    - <recent_trajectory> ... </recent_trajectory>

    The recent trajectory is a segment of the current run since the last refinement trigger.
    It may show repeated failures, ineffective actions, reasoning errors, tool-calling errors,
    missing validation, or stalled progress.

    Deliver your answer in <new_plan> ... </new_plan>.
    The plan should be high-level and directly help the agent recover from the recent issue and proceed to resolve the task.


  user_template: |-
    <issue_description>
    {{ISSUE_DESCRIPTION}}
    </issue_description>

    <latest_guidance>
    {{LATEST_GUIDANCE}}
    </latest_guidance>

    <recent_trajectory>
    {{RECENT_TRAJECTORY}}
    </recent_trajectory>

    # YOUR TASK

    Based on the issue description, the latest guidance (if any), and the recent trajectory,
    propose the most appropriate NEXT STEP for the agent.

    Focus primarily on the recent trajectory and what is needed to resolve the main issue.

    Requirements:
    - Output EXACTLY ONE step.
    - The step should be concrete and actionable at a high level, and clearly contribute to resolving the main task.
    - The step must directly address the recent problem (if any) shown in the trajectory.
    - If previous guidance exists, the new step should be consistent with it unless the recent
      trajectory shows that the guidance was ineffective or no longer appropriate.

    Your response MUST follow this EXACT structure:

    <new_plan>

    ### Next Step Plan
    [Provide a customized plan for the NEXT step.]

    </new_plan>
